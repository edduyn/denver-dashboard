        // ═══ AUTO-SYNC: Cross-reference billedWOsList vs customerDatabase ═══
        // Flags any billed WOs not yet in customerDatabase so they auto-surface in NPS
        function getBilledWOsNotInDatabase() {
            const dbWOs=new Set(customerDatabase.map(c=> c.wo.toUpperCase()));
            const missing=[];

            GOALS_DATA.billedWOsList.forEach(b=> {
                    // Handle multi-WO entries like 'DT13A, DT56A, DT99A'
                    const wos=b.wo.split(',').map(w=> w.trim().toUpperCase());

                    wos.forEach(wo=> {
                            if ( !dbWOs.has(wo)) {
                                missing.push({
                                    wo: wo, shop: b.shop, hours: b.hours, laborBilled: b.laborBilled, issue: b.issue || ''
                                });
                        }
                    });
            });
        return missing;
        }

        function renderCustomerTable() {
            const surveys=getNpsSurveys();
            const sentWOs=surveys.map(s=> s.wo.toUpperCase());
            const skipped=getSkippedWOs();
            const showSent=document.getElementById('showSentCustomers').checked;
            const tbody=document.getElementById('customerDbBody');
            const summaryDiv=document.getElementById('npsDbSummary');

            // Track which customers already have a survey this month (by email or custNum)
            const customerSurveyed=new Set();
            const customerShown=new Set();

            // Add sent customers to surveyed set
            surveys.forEach(s=> {
                    const cust=customerDatabase.find(c=> c.wo.toUpperCase()===s.wo.toUpperCase());

                    if (cust) {
                        customerSurveyed.add(cust.email || cust.custNum.toString());
                    }
                });

            // Categorize and sort customers
            let readyList=[];
            let lookupList=[];
            let sentList=[];
            let skippedList=[];
            let waivedList=[];

            // Sort by revenue descending first to prioritize highest value WO per customer
            const sortedDb=[...customerDatabase].sort((a, b)=> b.revenue - a.revenue);

            sortedDb.forEach(c=> {
                    const isSent=sentWOs.includes(c.wo.toUpperCase());
                    const isSkipped=skipped.includes(c.wo.toUpperCase());
                    const needsEmail= !c.email || c.name==='NEED LOOKUP';
                    const customerKey=c.email || c.custNum.toString();

                    // Check if this customer already surveyed this month
                    const alreadySurveyed=customerSurveyed.has(customerKey);
                    // Check if this customer already shown (duplicate WO for same customer)
                    const isDuplicate=customerShown.has(customerKey);

                    if (isSent) {
                        sentList.push({
                            ...c, status: 'sent'
                        });
                    customerSurveyed.add(customerKey);
                    customerShown.add(customerKey);
                }

                else if (alreadySurveyed || isDuplicate) {

                    // This customer already surveyed OR has a higher-revenue WO - waive this one
                    waivedList.push({
                        ...c, status: 'waived', reason: alreadySurveyed ? 'Already surveyed' : 'Duplicate'
                    });
                customerShown.add(customerKey);
            }

            else if (isSkipped) {
                skippedList.push({
                    ...c, status: 'skipped'
                });
            customerShown.add(customerKey);
        }

        else if (needsEmail) {
            lookupList.push({
                ...c, status: 'lookup'
            });
        customerShown.add(customerKey);
        }

        else {
            readyList.push({
                ...c, status: 'ready'
            });
        customerShown.add(customerKey);
        }
        });

        // Combine in priority order: Ready > Lookup > Waived > Skipped > Sent
        const orderedList=[...readyList, ...lookupList, ...waivedList, ...skippedList, ...sentList];

        let html='';
        let readyCount=readyList.length;
        let lookupCount=lookupList.length;
        let waivedCount=waivedList.length;
        let skippedCount=skippedList.length;
        let sentCount=sentList.length;

        // ═══ AUTO-SYNC: Show billed WOs not yet in customerDatabase ═══
        const missingWOs=getBilledWOsNotInDatabase();

        if (missingWOs.length > 0) {
            html +=`<tr style="background:rgba(239,68,68,0.25);" ><td colspan="6" style="color:#fca5a5;font-weight:bold;text-align:center;padding:6px;" > ⚠️ $ {
                missingWOs.length
            }

            Billed WO(s) not in NPS database — add customer info to enable survey </td></tr>`;

            missingWOs.forEach(m=> {
                    html +=`<tr style="background:rgba(239,68,68,0.1);" > <td><span style="color:#f87171;" >⚠️ NEW</span></td> <td><span style="color:#ef4444;font-size:0.75em;" >NOT IN DATABASE</span></td> <td style="color:#f87171;font-weight:bold;" >$ {
                        m.wo
                    }

                    </td> <td style="color:#94a3b8;" >$ {
                        m.shop
                    }

                    </td> <td style="color:#fbbf24;" >$$ {
                        m.laborBilled.toLocaleString()
                    }

                    </td> <td><span style="color:#f87171;font-size:0.75em;" >📋 Add to DB</span></td> </tr>`;
                });
        }

        orderedList.forEach(c=> {
                // Skip sent/skipped/waived if checkbox unchecked
                if ( !showSent && (c.status==='sent' || c.status==='skipped' || c.status==='waived')) return;

                // Row styling based on status
                let rowStyle='';

                if (c.status==='sent') {
                    rowStyle='background:rgba(107,114,128,0.3);opacity:0.7;';
                }

                else if (c.status==='skipped') {
                    rowStyle='background:rgba(100,116,139,0.2);opacity:0.6;';
                }

                else if (c.status==='waived') {
                    rowStyle='background:rgba(139,92,246,0.15);opacity:0.7;';
                }

                else if (c.status==='lookup') {
                    rowStyle='background:rgba(239,68,68,0.15);';
                }

                else if (c.revenue > 5000) {
                    rowStyle='background:rgba(16,185,129,0.2);';
                }

                const woStyle=(c.status==='sent' || c.status==='skipped' || c.status==='waived') ? 'color:#64748b;' : 'color:#60a5fa;font-weight:bold;';
                const revStyle=c.revenue===0 ? 'color:#94a3b8;' : 'color:#10b981;';
                const regDisplay=c.reg || '-';
                const revDisplay='$' + c.revenue.toLocaleString();

                // Name/Email display
                let nameDisplay, emailDisplay;

                if (c.status==='lookup') {
                    nameDisplay=`<span style="color:#f87171;" >⚠️ Cust# $ {
                        c.custNum
                    }

                    </span>`;
                    emailDisplay=`<span style="color:#ef4444;font-size:0.75em;" >NEED EMAIL LOOKUP</span>`;
                }

                else {
                    nameDisplay=c.name;

                    emailDisplay=`<span style="color:#fbbf24;font-family:monospace;font-size:0.8em;" >$ {
                        c.email
                    }

                    </span>`;
                }

                // Action button based on status
                let actionCell;

                if (c.status==='sent') {
                    actionCell='<span style="color:#10b981;font-size:0.8em;">✓ Sent</span>';
                }

                else if (c.status==='skipped') {
                    actionCell=`<span style="color:#64748b;font-size:0.75em;" >⊘ Skipped</span> <button onclick="undoSkip('${c.wo}')" style="background:#475569;color:white;border:none;padding:2px 6px;border-radius:3px;font-size:0.7em;cursor:pointer;margin-left:4px;" >Undo</button>`;
                }

                else if (c.status==='waived') {
                    actionCell=`<span style="color:#a78bfa;font-size:0.75em;" >↩️ Waived (dup)</span>`;
                }

                else if (c.status==='lookup') {
                    actionCell=`<span style="color:#f87171;font-size:0.75em;" >📋 Lookup</span>`;
                }

                else {
                    const btnStyle=c.revenue > 0 ? 'background:#10b981;' : 'background:#475569;';
                    actionCell=`<button onclick="fillNps('${c.name}','${c.email}','${c.wo}','${c.reg}')" style="${btnStyle}color:white;border:none;padding:4px 10px;border-radius:4px;font-size:0.8em;cursor:pointer;" >✓ Use</button><button onclick="skipWO('${c.wo}','${c.name}')" style="background:#64748b;color:white;border:none;padding:4px 8px;border-radius:4px;font-size:0.75em;cursor:pointer;margin-left:4px;" title="Skip this customer" >⊘</button>`;
                }

                html +=`<tr style="${rowStyle}" > <td>$ {
                    nameDisplay
                }

                </td> <td>$ {
                    emailDisplay
                }

                </td> <td style="${woStyle}" >$ {
                    c.wo
                }

                </td> <td style="color:#94a3b8;" >$ {
                    regDisplay
                }

                </td> <td style="${revStyle}" >$ {
                    revDisplay
                }

                </td> <td>$ {
                    actionCell
                }

                </td> </tr>`;
            });

        if (html==='') {
            html='<tr><td colspan="6" style="color:#64748b;text-align:center;">All customers have been surveyed! ✅</td></tr>';
        }

        tbody.innerHTML=html;

        // Update summary with detailed breakdown
        if (readyCount===0 && lookupCount===0 && missingWOs.length===0) {
            summaryDiv.innerHTML='✅ <strong>All ' + sentCount + ' surveys sent!</strong> Waiting for responses.';
            summaryDiv.style.background='#14532d';
            summaryDiv.style.color='#bbf7d0';
        }

        else {
            let summaryText='';

            if (missingWOs.length > 0) summaryText +=`<span style="color:#f87171;" >⚠️ $ {
                missingWOs.length
            }

            billed WOs missing from DB</span> | `;

            summaryText +=`<strong style="color:#10b981;" >$ {
                readyCount
            }

            ready</strong>`;

            if (lookupCount > 0) summaryText +=` | <span style="color:#f87171;" >$ {
                lookupCount
            }

            need email</span>`;

            if (waivedCount > 0) summaryText +=` | <span style="color:#a78bfa;" >$ {
                waivedCount
            }

            waived (dup)</span>`;

            if (skippedCount > 0) summaryText +=` | <span style="color:#94a3b8;" >$ {
                skippedCount
            }

            skipped</span>`;

            summaryText +=` | $ {
                sentCount
            }

            sent`;
            summaryDiv.innerHTML=summaryText;
            summaryDiv.style.background='#1e3a5f';
            summaryDiv.style.color='#93c5fd';
        }

        // Update count in header with sync status
        const totalBilled=GOALS_DATA.billedWOsList.reduce((c, b)=> c + b.wo.split(',').length, 0);
        const missingCount=getBilledWOsNotInDatabase().length;

        const syncStatus=missingCount > 0 ? ` <span style="color:#f87171;" >(⚠️ $ {
                missingCount
            }

            missing)</span>` : ' <span style="color:#10b981;">✅ synced</span>';
        document.getElementById('customerDbCount').innerHTML=customerDatabase.length + ' contacts | ' + totalBilled + ' billed WOs' + syncStatus;
        }

            const container=document.getElementById('weeklyGoalsContainer');

            if ( !container) return;
            const d=GOALS_DATA;
            const latestAB=d.abMonthly[d.abMonthly.length - 1];
            const months=['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const now=new Date();
            const currentMonth=months[now.getMonth()];
            const prevMonth=months[(now.getMonth() + 11) % 12];

            // Week of date (Monday of current week)
            const dayOfWeek=now.getDay();
            const mondayOffset=dayOfWeek===0 ? -6 : 1 - dayOfWeek;
            const monday=new Date(now);
            monday.setDate(now.getDate() + mondayOffset);
            const weekStr=(monday.getMonth() + 1).toString().padStart(2, '0') + '/' + monday.getDate().toString().padStart(2, '0');

            // ── A/B Target ──
            const currentAB=d.currentMonthAB;
            const hasCurrentData=currentAB !==null && currentAB !==undefined;
            const abBarPct=hasCurrentData ? Math.min(Math.round((currentAB / d.abTarget) * 100), 100) : 0;
            const abStatusBadge=hasCurrentData ? (currentAB >=d.abTarget ? '<span class="badge badge-green">On Target ✅</span>' : '<span class="badge badge-amber">In Progress</span>') : '<span class="badge badge-blue">New Month</span>';

            const abSubtext=hasCurrentData ? `$ {

            }

            }

            % (Matt)` : `$ {
                currentMonth
            }

            starts fresh | $ {
                prevMonth
            }

            closed at $ {
                latestAB.mattOfficial
            }

            % (Matt) / $ {

            let html=`<div style="background:#1e293b;padding:12px;border-radius:8px;margin-bottom:10px;" > <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;" > <span style="color:#e2e8f0;" >📊 A/B Target: Build $ {

            }

            / $ {
                d.abTarget

            html +=`<div style="background:#1e293b;padding:12px;border-radius:8px;margin-bottom:10px;" > <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;" > <span style="color:#e2e8f0;" >📋 Close $ {

                    d.agingNotes
                }

                </div>` : ''
            }

            </div>`;

            // ── Rank Improvement ──
            const denver=d.rankings.find(r=> r.isDenver);

            if (denver) {
                const denverIdx=d.rankings.indexOf(denver);
                // Find neighbors: 2 above, 1 below (or adjust at edges)
                const startIdx=Math.max(0, denverIdx - 2);
                const endIdx=Math.min(d.rankings.length - 1, denverIdx + 1);
                const neighbors=d.rankings.slice(startIdx, endIdx + 1);

                // Find next target to pass
                const above1=denverIdx > 0 ? d.rankings[denverIdx - 1] : null;
                const above2=denverIdx > 1 ? d.rankings[denverIdx - 2] : null;
                const below1=denverIdx < d.rankings.length - 1 ? d.rankings[denverIdx + 1] : null;
                const targetRank=above2 ? above2.rank : (above1 ? above1.rank : denver.rank);

                const rankGoal=`$ {
                    denver.rank

                th → $ {
                    targetRank

                let statusNotes=[];

                if (above1) statusNotes.push(`Need +$ {
                        (above1.pct - denver.pct).toFixed(1)

                    pts to pass $ {
                        above1.shop
                    }

                    `);

                if (above2) statusNotes.push(`+$ {
                        (above2.pct - denver.pct).toFixed(1)

                    pts to pass $ {
                        above2.shop

                html +=`<div style="background:#1e293b;padding:12px;border-radius:8px;" > <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;" > <span style="color:#e2e8f0;" >🏆 Move up to $ {
                    targetRank

                    rankGoal

                </span> </div> <div style="display:grid;grid-template-columns:repeat(${neighbors.length},1fr);gap:8px;font-size:0.85em;" > $ {
                    neighbors.map(n=> {
                            const isDen=n.isDenver;
                            const color=isDen ? '#f59e0b' : (n.pct >=d.networkBudget ? '#10b981' : n.pct >=40 ? '#f59e0b' : '#ef4444');

                            return `<div style="text-align:center;padding:5px;background:#0f172a;border-radius:4px;${isDen ? 'border:1px solid #f59e0b;' : ''}" > <div style="color:${isDen ? '#f59e0b' : '#94a3b8'};" >$ {
                                n.rank

                            th $ {

                            }

                            $ {
                                isDen ? ' ↑' : ''
                            }

                            </div> <div style="color:${color};font-weight:bold;" >$ {

                            }

                            %</div> </div>`;
                        }).join('')
                }

                </div> <div style="color:#10b981;font-size:0.8em;margin-top:5px;" >$ {
                    statusNotes.join(' | ')
                }

                </div> </div>`;
            }

            container.innerHTML=html;
        }

                    const isOver=variance > 0 && variance <=2;

                    const marginLoss=variance > 0 ? Math.round(variance * fr) : 0;
                    const marginGain=variance < 0 ? Math.round(Math.abs(variance) * fr) : 0;

            // ── Per-shop rate cards ──

            // Sort: losses first (biggest), then overs, then wins (biggest savings first)
            const sorted=[...enriched].sort((a, b)=> {

        // TICKER BAR RENDERER — Scans ALL GOALS_DATA for urgent actions

        // ═══════════════════════════════════════════════════════
        function renderTicker() {
            const bar=document.getElementById('tickerBar');
            if ( !bar) return;
            const d=GOALS_DATA;
            const rates=d.shopRates;
            const items=[]; // {icon, label, value, cls, priority}  cls: t-urgent | t-warn | t-ok

            // ── 1. OVER 30 DAYS — open/dispute WOs ──
            const o30open=d.over30Entries.filter(e=> e.status==='open');
            const o30dispute=d.over30Entries.filter(e=> e.status==='dispute');

            if (o30open.length > 0) {
                o30open.forEach(e=> items.push({
                        icon: '🔴', label: 'OVER 30', value: `$ {
                            e.wo
                        }

                        ($ {
                                e.days
                            }

                            d) — $ {
                            e.notes
                        }

                        `, cls: 't-urgent', priority: 1
                    }));
        }

        o30dispute.forEach(e=> items.push({
                icon: '⚠️', label: 'DISPUTE', value: `$ {
                    e.wo
                }

                $ {
                    e.days
                }

                d — $ {
                    e.notes
                }

                `, cls: 't-warn', priority: 2
            }));

        // ── 2. WIP — unbilled high-value WOs needing action ──
        const wipAction=d.wipEntries.filter(e=> !e.flags.includes('billed') && !e.flags.includes('loaned') && e.notes && (e.notes.includes('Push') || e.notes.includes('Review')));

        wipAction.forEach(e=> items.push({
                icon: '💰', label: 'WIP', value: `$ {
                    e.wo
                }

                $$ {
                    e.wip.toLocaleString()
                }

                — $ {
                    e.notes
                }

                `, cls: 't-warn', priority: 3
            }));

        // ── 3. WIP — audit-flagged WOs ──
        const wipAudit=d.wipEntries.filter(e=> e.flags.includes('audit') && !e.flags.includes('billed'));

        if (wipAudit.length > 0) {
            items.push({
                icon: '🔍', label: 'AUDIT', value: `$ {
                    wipAudit.length
                }

                WO(s) cited: $ {
                    wipAudit.map(e=> e.wo).join(', ')
                }

                `, cls: 't-warn', priority: 4
            });
        }

        // ── 4. SDV Expected Hours — missing estimates ──
        const sdvMissing=d.sdvWOs.filter(w=> !w.flags.includes('completed') && (w.expectedHrs===null || w.expectedHrs===0));

        if (sdvMissing.length > 0) {
            items.push({
                icon: '📋', label: 'SDV ESTIMATES', value: `$ {
                    sdvMissing.length
                }

                WO(s) missing: $ {
                    sdvMissing.map(w=> w.wo).join(', ')
                }

                `, cls: 't-warn', priority: 5
            });
        }

        // ── 5. NQA Problem Jobs — big losses ──
        const nqaLosses=d.nqaJobs.filter(j=> {
                const v=j.actualHrs - j.flatRateHrs;
                return v > 2;
            }).sort((a, b)=> (b.actualHrs - b.flatRateHrs) - (a.actualHrs - a.flatRateHrs));

        nqaLosses.forEach(j=> {
                const v=+(j.actualHrs - j.flatRateHrs).toFixed(1);
                const fr=rates[j.shop] ? rates[j.shop].flatRate : 218;

                items.push({
                    icon: '📉', label: 'NQA LOSS', value: `$ {
                        j.wo
                    }

                    ($ {
                            j.shop

                        }) +$ {
                        v
                    }

                    h over → ~$$ {
                        Math.round(v * fr)
                    }

                    loss`, cls: 't-urgent', priority: 6
                });
        });

        // ── 6. Aging WO Goal — progress ──
        const agClosed=d.agingClosed.length;
        const agTarget=d.agingTarget;
        const agRemain=agTarget - agClosed;

        if (agRemain > 0) {
            items.push({
                icon: '📅', label: 'AGING GOAL', value: `$ {
                    agClosed
                }

                /$ {
                    agTarget
                }

                closed this week — $ {
                    agRemain
                }

                remaining`, cls: agRemain <=2 ? 't-warn' : 't-urgent', priority: 7
            });
        }

        else {
            items.push({
                icon: '✅', label: 'AGING GOAL', value: `$ {
                    agTarget
                }

                /$ {
                    agTarget
                }

                target met !`, cls: 't-ok', priority: 20
            });
        }

        // ── 7. Training — upcoming/overdue ──
        const now=new Date();

        const trainUpcoming=d.training.techSchedule.filter(t=> {
                if (t.status==='completed') return false;
                if (t.status==='tbd') return false;
                // Check if within 14 days
                const dateStr=t.dates.split(' - ')[0].replace(/(\w+)\s(\d+)/, '$1 $2, 2026');

                return !isNaN(d2) && d2 > now && (d2 - now) < 14 * 86400000;
            });

        trainUpcoming.forEach(t=> {
                items.push({
                    icon: '🎓', label: 'TRAINING', value: `$ {
                        t.name
                    }

                    — $ {
                        t.course
                    }

                        })`, cls: 't-warn', priority: 8
                });
        });

        // ── 8. LMS Pending ──
        const lmsPending=d.training.lmsModules.filter(m=> m.status==='pending');

        if (lmsPending.length > 0) {
            items.push({
                icon: '📚', label: 'LMS', value: `$ {
                    lmsPending.length
                }

                module(s) pending: $ {
                    lmsPending.map(m=> m.name).join(', ')
                }

                `, cls: 't-warn', priority: 9
            });
        }

        // ── 9. Vendor Disputes — active ──
        const activeDisputes=d.vendorDisputes.filter(v=> v.notes && !v.notes.toLowerCase().includes('resolved'));

        if (activeDisputes.length > 0) {
            activeDisputes.forEach(v=> items.push({
                    icon: '🏭', label: 'VENDOR', value: `$ {
                        v.wo
                    }

                    — $ {
                        v.notes
                    }

                    `, cls: 't-warn', priority: 10
                }));
        }

        // ── 10. Audit findings — open ──
        if (d.audits && d.audits.length > 0) {
            const lastAudit=d.audits[d.audits.length - 1];

            if (lastAudit.findings > 0 && lastAudit.closed < lastAudit.findings) {
                const open=lastAudit.findings - lastAudit.closed;

                items.push({
                    icon: '🔎', label: 'AUDIT', value: `$ {
                        open
                    }

                    finding(s) open from $ {
                        lastAudit.date
                    }

                    $ {
                        lastAudit.type
                    }

                    audit$ {
                        lastAudit.repeats > 0 ? ' (' + lastAudit.repeats + ' REPEAT)' : ''
                    }

                    `, cls: 't-warn', priority: 4
                });
        }
        }

        // ── 11. A/B Ranking — position awareness ──
        const denverRank=d.rankings.find(r=> r.isDenver);

        if (denverRank) {
            const pos=d.rankings.filter(r=> r.isDenver)[0];
            const rankIdx=d.rankings.indexOf(pos) + 1;
            const total=d.rankings.length;
            const abCls=pos.pct >=d.networkBudget ? 't-ok' : pos.pct >=40 ? 't-warn' : 't-urgent';

            items.push({
                icon: '📊', label: 'A/B RANK', value: `#$ {
                    rankIdx
                }

                /$ {
                    total
                }

                ($ {
                        pos.pct
                    }

                    %) — Budget: $ {
                    d.networkBudget
                }

                %`, cls: abCls, priority: 15
            });
        }

        // ── 12. WIP Total ──
        const openWip=d.wipEntries.filter(e=> !e.flags.includes('billed'));
        const openWipTotal=openWip.reduce((s, e)=> s + e.wip, 0);

        items.push({
            icon: '💵', label: 'OPEN WIP', value: `$$ {
                openWipTotal.toLocaleString()
            }

            across $ {
                openWip.length
            }

            WOs`, cls: openWipTotal > 20000 ? 't-warn' : 't-ok', priority: 16
        });

        // ── 13. Stale data warnings ──
        const parseDate=s=> {
            const p=s.split('/'); return new Date(2000 + parseInt(p[2]), parseInt(p[0]) - 1, parseInt(p[1]));
        }

        ;

        const daysSince=s=> {
            try {
                return Math.floor((now - parseDate(s)) / 86400000);
            }

            catch (e) {
                return 0;
            }
        }

        ;

        const wipAge=daysSince(d.wipDate);

        if (wipAge > 3) items.push({
            icon: '⏰', label: 'STALE DATA', value: `WIP data is $ {
                wipAge
            }

            days old ($ {
                    d.wipDate
                })`, cls: 't-urgent', priority: 0
        });
        const rankAge=daysSince(d.rankingsDate);

        if (rankAge > 10) items.push({
            icon: '⏰', label: 'STALE DATA', value: `Rankings data is $ {
                rankAge
            }

            days old ($ {
                    d.rankingsDate
                })`, cls: 't-warn', priority: 0
        });
        const nqaAge=daysSince(d.nqaLastUpdated);

        if (nqaAge > 7) items.push({

                i.label
            }

            </span><span class="t-value ${i.cls}" >$ {
                i.value
            }

            </span></div>`).join('');

        // Adjust speed: ~3 seconds per item
        const duration=Math.max(items.length * 3, 20);

        bar.innerHTML=` <div class="ticker-label ${labelCls}" >$ {
            labelText
        }

        $ {
            countBadge

        </div> <div class="ticker-track" > <div class="ticker-content" style="--ticker-duration:${duration}s" > $ {

        }

        function renderTechSchedule() {
